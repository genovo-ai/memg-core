name: create awesome workflow for memg core
on:
  push:

env:
  full_sha: "${{ github.sha }}"
  branch_name: ${{ github.ref_name }}
  GIT_AUTHOR: ${{ github.event.head_commit.author.name }}
  GIT_COMMIT: ${{ github.sha }}
  GIT_BRANCH: ${{ github.ref_name }}
  GIT_REPO: ${{ github.repository }}

jobs:
  #################### Security & Quality Checks ########################
  #######################################################################
  security-and-quality-check:
    runs-on: ubuntu-latest
    steps:
      ############ checkout the code ##########
      - name: checkout the code
        uses: actions/checkout@v4


      ############# use python ################
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      ############# use bandit and ruff ################
      - name: use bandit (this is for security)
        run: |
          pip install -r requirements-dev.txt
          echo "bandit ;)"
          bandit -r src/
          echo "ruff ;)"
          ruff format --check src/
      
      - name: Pylint code quality check
        run: |
          echo "Running pylint quality check..."
          pylint src/ --fail-under=7.0 --score=yes

      - name: Type checking with mypy
        run: |
          echo "Running type checking..."
          mypy src/ --ignore-missing-imports || echo "Type checking completed with warnings"

      - name: Run tests
        run: |
          echo "Running test suite..."
          python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing || echo "Tests completed"
          


################ building docker image ####################
  build_docker_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: just check sth real quick
        ############ checkout the code ######################
      - name: checkout the code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: build docker image and push it gcr
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/${{env.GIT_REPO}}:${{env.branch_name}}-${{ env.full_sha }}
          docker push ghcr.io/${{ github.repository_owner }}/${{env.GIT_REPO}}:${{env.branch_name}}-${{ env.full_sha }}
          







